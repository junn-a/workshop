/* ------------------------------------------------------------------ */
/*  Fonts (already loaded via <link> in <head>; helpers kept for parity) */
/* ------------------------------------------------------------------ */

const font = {
  display: { fontFamily: "'Space Grotesk', sans-serif" },
  body: { fontFamily: "'Inter', sans-serif" },

};

/* ------------------------------------------------------------------ */
/*  Signature element: CAD viewport corner brackets                    */
/* ------------------------------------------------------------------ */

function ViewportCorners({ className = "", color = "stroke-emerald-500" }) {
  const corner = "absolute w-6 h-6 md:w-8 md:h-8 transition-all duration-300";
  return (
    <div className={`pointer-events-none absolute inset-0 ${className}`}>
      <svg className={`${corner} -top-2 -left-2 md:-top-3 md:-left-3`} viewBox="0 0 32 32" fill="none">
        <path d="M2 14V2H14" strokeWidth="2" className={color} strokeLinecap="square" />
      </svg>
      <svg className={`${corner} -top-2 -right-2 md:-top-3 md:-right-3`} viewBox="0 0 32 32" fill="none">
        <path d="M30 14V2H18" strokeWidth="2" className={color} strokeLinecap="square" />
      </svg>
      <svg className={`${corner} -bottom-2 -left-2 md:-bottom-3 md:-left-3`} viewBox="0 0 32 32" fill="none">
        <path d="M2 18V30H14" strokeWidth="2" className={color} strokeLinecap="square" />
      </svg>
      <svg className={`${corner} -bottom-2 -right-2 md:-bottom-3 md:-right-3`} viewBox="0 0 32 32" fill="none">
        <path d="M30 18V30H18" strokeWidth="2" className={color} strokeLinecap="square" />
      </svg>
    </div>
  );
}

function BlueprintGrid({ className = "" }) {
  return (
    <svg className={`absolute inset-0 h-full w-full ${className}`} xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="ferrum-grid" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M40 0H0V40" fill="none" stroke="currentColor" strokeWidth="1" />
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#ferrum-grid)" />
    </svg>
  );
}

function SpecBadge({ label, value, className = "" }) {
  return (
    <div className={`rounded-lg border border-zinc-800 bg-zinc-950/90 px-4 py-3 backdrop-blur-sm shadow-xl shadow-black/40 ${className}`}>
      <div style={font.mono} className="text-[10px] uppercase tracking-widest text-zinc-500">{label}</div>
      <div style={font.mono} className="mt-1 text-sm font-medium text-emerald-400">{value}</div>
    </div>
  );
}

/* ------------------------------------------------------------------ */
/*  Navbar                                                             */
/* ------------------------------------------------------------------ */

function Navbar() {
  const [scrolled, setScrolled] = useState(false);
  const [open, setOpen] = useState(false);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 24);
    window.addEventListener("scroll", onScroll);
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  return (
    <header className={`fixed top-0 z-50 w-full transition-all duration-300 ${scrolled ? "border-b border-zinc-800 bg-zinc-950/80 backdrop-blur-xl" : "border-b border-transparent bg-transparent"}`}>
      <div className="mx-auto flex max-w-7xl items-center justify-between px-6 py-4 md:px-10">
        <a href="#top" className="flex items-center gap-2">
          <span className="flex h-8 w-8 items-center justify-center rounded border border-emerald-500/40 bg-emerald-500/10">
            <span style={font.mono} className="text-xs font-medium text-emerald-400">FW</span>
          </span>
          <span style={font.display} className="text-lg font-semibold tracking-tight text-zinc-50">
            FERRUM<span className="text-emerald-500">WORKS</span>
          </span>
        </a>

        <nav className="hidden items-center gap-8 md:flex">
          {NAV_LINKS.map((l) => (
            <a key={l.href} href={l.href} className="text-sm text-zinc-300 transition-colors hover:text-emerald-400">{l.label}</a>
          ))}
        </nav>

        <div className="hidden md:block">
          <a href="#kontak" className="group inline-flex items-center gap-2 rounded-md bg-emerald-500 px-4 py-2 text-sm font-medium text-zinc-950 transition-all hover:bg-emerald-400 hover:shadow-lg hover:shadow-emerald-500/20">
            Ajukan RFQ
            <Icons.ArrowRight width={16} height={16} className="transition-transform group-hover:translate-x-0.5" />
          </a>
        </div>

        <button className="text-zinc-200 md:hidden" onClick={() => setOpen((v) => !v)} aria-label="Buka menu navigasi">
          {open ? <Icons.Close /> : <Icons.Menu />}
        </button>
      </div>

      {open && (
        <div className="border-t border-zinc-800 bg-zinc-950/95 px-6 py-4 md:hidden">
          <nav className="flex flex-col gap-4">
            {NAV_LINKS.map((l) => (
              <a key={l.href} href={l.href} onClick={() => setOpen(false)} className="text-sm text-zinc-300 hover:text-emerald-400">{l.label}</a>
            ))}
            <a href="#kontak" onClick={() => setOpen(false)} className="mt-2 inline-flex items-center justify-center gap-2 rounded-md bg-emerald-500 px-4 py-2 text-sm font-medium text-zinc-950">
              Ajukan RFQ
            </a>
          </nav>
        </div>
      )}
    </header>
  );
}
